name: publish-jsr

# Publish @bounded-systems/policy to JSR via tokenless OIDC (id-token: write),
# verified against the linked GitHub repo (bounded-systems/policy). Trigger: push a
# release tag `v<version>`, or workflow_dispatch. JSR publishes TS source
# directly; --allow-slow-types keeps parity with the monorepo.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Publish to JSR
        run: bunx jsr publish --allow-slow-types
